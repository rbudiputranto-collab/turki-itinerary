<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1829">
<title>9H8M Turki</title>
<style>
/* ── RESET & TOKENS ── */
:root {
  --navy:#1A2744; --navy2:#0d1829; --navy3:#111e35;
  --gold:#C8A45C; --gold2:#e4c98a; --gold3:rgba(200,164,92,.12);
  --cream:#F7F3EB; --rust:#B85C3A; --teal:#2A7B88; --green:#27AE60;
  --gray:#6B6560; --border:rgba(200,164,92,.14);
  /* iOS safe areas */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
  /* layout */
  --topbar-h: 56px;
  --tabbar-h: 60px;
  --sheet-peek: 120px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height:100%; -webkit-text-size-adjust:100%; }
body {
  height:100%; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--navy2); color:var(--cream);
  display:flex; flex-direction:column;
  /* prevent rubber-band on body */
  overscroll-behavior:none;
}
button { font-family:inherit; cursor:pointer; }
a { text-decoration:none; color:inherit; }
img { display:block; }

/* ── STATUS BAR SPACER (iPhone notch) ── */
.status-spacer {
  height: calc(var(--sat) + 0px);
  background: var(--navy);
  flex-shrink: 0;
}

/* ── TOP BAR ── */
.topbar {
  background:var(--navy);
  height:var(--topbar-h);
  padding:0 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tb-l { display:flex; align-items:center; gap:10px; }
.tb-icon { font-size:22px; }
.tb-title { font-size:16px; font-weight:700; line-height:1.2; letter-spacing:-.01em; }
.tb-sub { font-size:11px; color:var(--gold); letter-spacing:.03em; margin-top:1px; }
.tb-badge {
  background:var(--gold); color:var(--navy);
  font-size:11px; font-weight:700;
  padding:4px 10px; border-radius:20px;
  white-space:nowrap;
}

/* ── MAIN AREA ── */
.main {
  flex:1; overflow:hidden; position:relative;
  display:flex; flex-direction:column;
}

/* ── DAY TAB BAR (top, horizontal scroll) ── */
.day-bar {
  background:var(--navy3);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  overflow-x:auto; overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  display:flex; align-items:center;
  gap:0;
  padding:0 12px;
  height:48px;
}
.day-bar::-webkit-scrollbar { display:none; }
.day-tab {
  flex-shrink:0;
  height:36px; padding:0 14px;
  border-radius:18px;
  font-size:12px; font-weight:600;
  color:rgba(247,243,235,.5);
  background:transparent;
  border:none;
  display:flex; align-items:center; gap:5px;
  transition:all .18s;
  white-space:nowrap;
  margin-right:4px;
  /* min touch target */
  min-width:44px;
}
.day-tab .dt-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
  opacity:.5; transition:opacity .18s;
}
.day-tab.on {
  background:var(--gold); color:var(--navy); font-weight:700;
}
.day-tab.on .dt-dot { opacity:1; }

/* ── PLACE LIST (scrollable main content) ── */
.place-list {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:12px 0 calc(var(--sab) + 16px);
}
.place-list::-webkit-scrollbar { display:none; }

/* Day section header */
.section-hdr {
  padding:16px 16px 8px;
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:rgba(200,164,92,.6);
  position:sticky; top:0;
  background:var(--navy2);
  z-index:5;
  /* slight blur for glassmorphism */
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

/* Place row card */
.place-row {
  display:flex; align-items:center; gap:12px;
  padding:11px 16px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .14s;
  /* min touch target height */
  min-height:56px;
  position:relative;
}
.place-row:active { background:rgba(200,164,92,.08); }
.place-row.on {
  background:rgba(200,164,92,.1);
  border-left-color:var(--gold);
}
.pr-emoji {
  width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.pr-body { flex:1; min-width:0; }
.pr-name {
  font-size:14px; font-weight:600; line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.pr-meta {
  font-size:12px; color:var(--gray); margin-top:2px;
  display:flex; align-items:center; gap:6px;
}
.pr-time { white-space:nowrap; }
.pr-chevron {
  color:rgba(247,243,235,.2); font-size:16px; flex-shrink:0;
}
/* separator */
.place-row + .place-row::before {
  content:''; position:absolute; top:0; left:68px; right:0;
  height:1px; background:var(--border);
}

/* ── DETAIL SHEET ── */
.sheet-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.5); z-index:80;
}
.sheet-backdrop.show { display:block; }

.sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--navy3);
  border-radius:20px 20px 0 0;
  z-index:90;
  max-height:92vh;
  display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,0,.15,1);
  /* bottom safe area */
  padding-bottom:var(--sab);
}
.sheet.open { transform:translateY(0); }

.sheet-handle-wrap {
  padding:10px 0 0; flex-shrink:0;
  display:flex; justify-content:center;
}
.sheet-handle {
  width:36px; height:5px; border-radius:3px;
  background:rgba(200,164,92,.3);
}

.sheet-scroll {
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  flex:1;
}
.sheet-scroll::-webkit-scrollbar { display:none; }

/* Hero photo */
.sh-hero {
  width:100%; height:240px; position:relative;
  flex-shrink:0; background:var(--navy2);
}
.sh-hero img {
  width:100%; height:100%; object-fit:cover;
}
.sh-hero-grad {
  position:absolute; inset:0;
  background:linear-gradient(to bottom, transparent 30%, rgba(13,24,41,.98) 100%);
}
.sh-hero-info {
  position:absolute; bottom:14px; left:16px; right:50px;
}
.sh-badge {
  display:inline-block;
  font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  padding:3px 9px; border-radius:10px; margin-bottom:6px;
}
.sh-name {
  font-size:22px; font-weight:700; line-height:1.2;
  color:var(--cream);
}
.sh-close {
  position:absolute; top:14px; right:14px;
  width:32px; height:32px; border-radius:50%;
  background:rgba(0,0,0,.5); border:none;
  color:#fff; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}

/* Sheet body */
.sh-body { padding:16px 16px 0; }
.sh-time {
  display:inline-flex; align-items:center; gap:5px;
  font-size:12px; color:var(--gold);
  background:var(--gold3); padding:4px 12px; border-radius:12px;
  margin-bottom:12px;
}
.sh-desc {
  font-size:14px; color:rgba(247,243,235,.8);
  line-height:1.65; margin-bottom:14px;
}
.sh-tags {
  display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px;
}
.sh-tag {
  font-size:11px; padding:3px 10px; border-radius:10px;
  border:1px solid rgba(200,164,92,.25); color:rgba(247,243,235,.58);
}

/* Photo strip */
.sh-photos {
  display:flex; gap:8px;
  overflow-x:auto; overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 16px 16px;
  scrollbar-width:none;
}
.sh-photos::-webkit-scrollbar { display:none; }
.sh-thumb {
  width:110px; height:78px; border-radius:10px;
  object-fit:cover; flex-shrink:0;
  border:2px solid transparent;
  transition:border-color .14s;
}
.sh-thumb:active { border-color:var(--gold); }

/* CTA button */
.sh-cta-wrap { padding:0 16px 16px; }
.sh-cta {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; height:50px;
  background:var(--gold); color:var(--navy);
  font-size:14px; font-weight:700; border-radius:14px;
  border:none;
  /* iOS haptic-friendly active state */
  transition:transform .1s, opacity .1s;
}
.sh-cta:active { transform:scale(.97); opacity:.9; }

/* Sheet nav (prev/next) */
.sh-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px 4px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.sh-nav-btn {
  display:flex; align-items:center; gap:4px;
  font-size:12px; font-weight:500;
  color:rgba(247,243,235,.5);
  background:transparent; border:1px solid var(--border);
  padding:8px 12px; border-radius:10px;
  min-width:44px; min-height:36px;
  transition:all .14s;
}
.sh-nav-btn:not(.disabled):active {
  color:var(--gold); border-color:rgba(200,164,92,.4);
  background:var(--gold3);
}
.sh-nav-btn.disabled { opacity:.25; pointer-events:none; }
.sh-nav-pos { font-size:12px; color:rgba(247,243,235,.35); }

/* ── OVERVIEW SCREEN ── */
.overview {
  padding:20px 16px calc(20px + var(--sab));
}
.ov-title { font-size:24px; font-weight:700; margin-bottom:5px; line-height:1.2; }
.ov-sub { font-size:13px; color:rgba(247,243,235,.55); margin-bottom:20px; line-height:1.5; }
.ov-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.ov-card {
  background:var(--navy3); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px;
}
.ov-num { font-size:26px; font-weight:700; color:var(--gold); line-height:1; }
.ov-lbl { font-size:11px; color:rgba(247,243,235,.5); margin-top:4px; }
.ov-route-card {
  background:var(--navy3); border:1px solid var(--border);
  border-radius:14px; padding:16px;
}
.ov-route-title {
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--gold); margin-bottom:14px;
}
.route-row {
  display:flex; align-items:center; flex-wrap:wrap; gap:4px;
}
.r-stop {
  display:flex; align-items:center; gap:6px;
  background:rgba(247,243,235,.05); border-radius:10px;
  padding:5px 10px;
}
.r-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.r-lbl { font-size:12px; font-weight:500; }
.r-arr { color:rgba(200,164,92,.4); font-size:14px; margin:0 2px; }

/* ── LIGHTBOX ── */
.lightbox {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.95); z-index:200;
  align-items:center; justify-content:center;
}
.lightbox.open { display:flex; }
.lb-img {
  max-width:96vw; max-height:88vh;
  border-radius:10px; object-fit:contain;
}
.lb-close {
  position:fixed; top:calc(var(--sat) + 14px); right:16px;
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,.15); border:none;
  color:#fff; font-size:18px;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}

/* ── DESKTOP: show sidebar layout ── */
@media (min-width:768px) {
  .main { flex-direction:row; }
  .day-bar { display:none; }
  .sidebar-desk {
    width:300px; flex-shrink:0;
    background:var(--navy3);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .sd-head {
    padding:14px 16px 10px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .sd-title { font-size:12px; color:var(--gold); font-weight:600; margin-bottom:8px; }
  .sd-tabs {
    display:flex; gap:3px; flex-wrap:wrap;
  }
  .sd-tab {
    padding:3px 8px; border-radius:11px;
    font-size:10px; font-weight:500;
    border:1px solid rgba(200,164,92,.28);
    color:rgba(247,243,235,.55);
    background:transparent;
    transition:all .14s;
  }
  .sd-tab:hover,.sd-tab.on { background:var(--gold); color:var(--navy); font-weight:700; border-color:var(--gold); }
  .sd-list {
    overflow-y:auto; flex:1;
    padding:5px 0;
  }
  .sd-list::-webkit-scrollbar { width:3px; }
  .sd-list::-webkit-scrollbar-thumb { background:rgba(200,164,92,.2); border-radius:2px; }
  .sd-day-lbl {
    padding:8px 14px 3px;
    font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:rgba(200,164,92,.6);
    position:sticky; top:0; background:var(--navy3); z-index:2;
  }
  .sd-row {
    display:flex; align-items:flex-start; gap:8px;
    padding:7px 14px; cursor:pointer;
    border-left:3px solid transparent;
    transition:background .12s;
    min-height:48px;
  }
  .sd-row:hover { background:rgba(200,164,92,.06); }
  .sd-row.on { background:rgba(200,164,92,.11); border-left-color:var(--gold); }
  .sd-dot {
    width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; flex-shrink:0; margin-top:1px;
  }
  .sd-name { font-size:12px; font-weight:500; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sd-time { font-size:10px; color:var(--gray); margin-top:1px; }

  /* content pane on desktop */
  .content-desk {
    flex:1; overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .content-desk::-webkit-scrollbar { width:4px; }
  .content-desk::-webkit-scrollbar-thumb { background:rgba(200,164,92,.2); border-radius:2px; }

  /* sheet becomes inline on desktop */
  .sheet-backdrop { display:none !important; }
  .sheet {
    position:static !important; transform:none !important;
    border-radius:0 !important; max-height:none !important;
    flex:1 !important; background:transparent !important;
    padding-bottom:0 !important;
  }
  .sheet.open { /* always open on desktop */ }
  .sh-hero { height:280px; }
  .sh-close { display:none; }
  .sh-nav { padding:14px 20px 20px; }
}

/* Notch-specific: only show status spacer on iOS with safe area */
@supports (padding-top: env(safe-area-inset-top)) {
  .status-spacer { display:block; }
}
@supports not (padding-top: env(safe-area-inset-top)) {
  .status-spacer { display:none; }
}
</style>
</head>

var DN={1:'Dubai → Istanbul',2:'Sultanahmet',3:'Sisi Asia & Galata',4:'Bazaar & Bus Malam',5:'Tiba Cappadocia',6:'Self-Drive Day 1',7:'Self-Drive Day 2',8:'Safranbolu',9:'Kepulangan'};
var DC={1:'#3D6B99',2:'#3D6B99',3:'#3D6B99',4:'#B85C3A',5:'#E67E22',6:'#E67E22',7:'#E67E22',8:'#8E44AD',9:'#27AE60'};

var activeId=null, currentFilter='all';
var isMobile=function(){return window.innerWidth<768;};

/* ── BUILD DAY TABS (mobile top bar) ─── */
function buildDayBar(){
  var el=document.getElementById('dayBar');
  el.innerHTML='';
  [['Semua','all']].concat([1,2,3,4,5,6,7,8].map(function(d){return['H'+d,d];})).forEach(function(pair){
    var label=pair[0],val=pair[1];
    var b=document.createElement('button');
    b.className='day-tab'+(val===currentFilter?' on':'');
    if(val!=='all'){
      b.innerHTML='<span class="dt-dot" style="background:'+DC[val]+'"></span>'+label;
    } else {
      b.textContent=label;
    }
    b.addEventListener('click',function(){setFilter(val,true);});
    el.appendChild(b);
  });
}

/* ── BUILD DESKTOP SIDEBAR TABS ──── */
function buildSdTabs(){
  var el=document.getElementById('sdTabs');
  el.innerHTML='';
  [['Semua','all']].concat([1,2,3,4,5,6,7,8].map(function(d){return['H'+d,d];})).forEach(function(pair){
    var label=pair[0],val=pair[1];
    var b=document.createElement('button');
    b.className='sd-tab'+(val===currentFilter?' on':'');
    b.textContent=label;
    b.addEventListener('click',function(){setFilter(val,false);});
    el.appendChild(b);
  });
}

/* ── BUILD PLACE LIST ─────────────── */
function buildList(target,onRowClick){
  target.innerHTML='';
  var fd=currentFilter;
  var filtered=fd==='all'?P:P.filter(function(p){return p.d===fd;});
  var days=[];
  filtered.forEach(function(p){if(days.indexOf(p.d)<0)days.push(p.d);});
  days.sort(function(a,b){return a-b;});
  days.forEach(function(day){
    var hdr=document.createElement('div');
    hdr.className='section-hdr';
    hdr.textContent='H'+day+' · '+(DN[day]||'');
    target.appendChild(hdr);
    filtered.filter(function(p){return p.d===day;}).forEach(function(p){
      var row=document.createElement('div');
      row.className='place-row'+(activeId===p.id?' on':'');
      row.id=(target===document.getElementById('placeList')?'pr-':'sd-')+p.id;
      row.innerHTML=
        '<div class="pr-emoji" style="background:'+p.c+'18">'+p.e+'</div>'
        +'<div class="pr-body">'
        +'<div class="pr-name">'+p.n+'</div>'
        +'<div class="pr-meta"><span class="pr-time">🕐 '+p.t+'</span></div>'
        +'</div>'
        +'<span class="pr-chevron">›</span>';
      row.addEventListener('click',function(){onRowClick(p.id);});
      target.appendChild(row);
    });
  });
}

/* ── RENDER SHEET CONTENT ─────────── */
function renderSheet(id){
  var idx=P.findIndex(function(x){return x.id===id;});
  var p=P[idx];
  var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p.n+', '+p.mapsQ);

  // Hero
  var heroSrc=(p.photos&&p.photos[0])||'';
  var heroHtml=heroSrc
    ?'<div class="sh-hero"><img src="'+heroSrc+'" alt="'+p.n+'" onerror="this.parentNode.style.display=\'none\'"><div class="sh-hero-grad"></div><div class="sh-hero-info"><div class="sh-badge" style="background:'+p.c+'25;color:'+p.c+';border:1px solid '+p.c+'40">'+p.e+' Hari '+p.d+'</div><div class="sh-name">'+p.n+'</div></div></div>'
    :'';

  // Photo strip (extra photos)
  var stripHtml='';
  if(p.photos&&p.photos.length>1){
    stripHtml='<div class="sh-photos">'+p.photos.map(function(u,i){
      return '<img class="sh-thumb" src="'+u+'" loading="lazy" alt="" onerror="this.style.display=\'none\'" onclick="window._lb(\''+u+'\')">';
    }).join('')+'</div>';
  }

  document.getElementById('shContent').innerHTML=
    heroHtml
    +'<div class="sh-body">'
    +'<div class="sh-time">🕐 '+p.t+'</div>'
    +'<div class="sh-desc">'+p.desc+'</div>'
    +'<div class="sh-tags">'+p.tags.map(function(t){return'<span class="sh-tag">'+t+'</span>';}).join('')+'</div>'
    +'</div>'
    +stripHtml
    +'<div class="sh-cta-wrap">'
    +'<a class="sh-cta" href="'+mapsUrl+'" target="_blank" rel="noopener">🗺️ Buka di Google Maps</a>'
    +'</div>';

  // Nav
  var prev=idx>0?P[idx-1]:null;
  var next=idx<P.length-1?P[idx+1]:null;
  document.getElementById('shNav').innerHTML=
    '<button class="sh-nav-btn'+(prev?'':' disabled')+'" onclick="window._goto('+(prev?prev.id:0)+')">← '+(prev?prev.e+' '+prev.n.split(',')[0].split('(')[0].trim().split(' ').slice(0,2).join(' '):'')+'</button>'
    +'<span class="sh-nav-pos">'+(idx+1)+' / '+P.length+'</span>'
    +'<button class="sh-nav-btn'+(next?'':' disabled')+'" onclick="window._goto('+(next?next.id:0)+')">'+(next?next.e+' '+next.n.split(',')[0].split('(')[0].trim().split(' ').slice(0,2).join(' ')+' →':'')+'</button>';

  // Reset scroll
  document.getElementById('sheetScroll').scrollTop=0;
}

/* ── SELECT PLACE ─────────────────── */
function selectPlace(id){
  activeId=id;

  // Update row highlights in both lists
  document.querySelectorAll('.place-row, .sd-row').forEach(function(el){el.classList.remove('on');});
  var pr=document.getElementById('pr-'+id);
  var sr=document.getElementById('sd-'+id);
  if(pr){pr.classList.add('on'); pr.scrollIntoView({behavior:'smooth',block:'nearest'});}
  if(sr){sr.classList.add('on'); sr.scrollIntoView({behavior:'smooth',block:'nearest'});}

  renderSheet(id);

  if(isMobile()){
    // Open bottom sheet
    document.getElementById('sheet').classList.add('open');
    document.getElementById('sheetBg').classList.add('show');
  }
}

window._goto=function(id){if(id)selectPlace(id);};

/* ── FILTER ───────────────────────── */
function setFilter(fd,isMob){
  currentFilter=fd;
  // rebuild tabs
  buildDayBar();
  buildSdTabs();
  // scroll day bar to show active tab
  if(isMob){
    var activetab=document.querySelector('.day-tab.on');
    if(activetab) activetab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
  buildList(document.getElementById('placeList'),function(id){selectPlace(id);});
  buildList(document.getElementById('sdList'),function(id){selectPlace(id);});
  // auto-select first of filter
  var first=fd==='all'?null:P.find(function(p){return p.d===fd;});
  if(first) selectPlace(first.id);
  else { activeId=null; renderOverview(); }
}

/* ── SHEET CLOSE ──────────────────── */
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheetBg').classList.remove('show');
  activeId=null;
  document.querySelectorAll('.place-row').forEach(function(el){el.classList.remove('on');});
}
document.getElementById('shClose').addEventListener('click',closeSheet);
document.getElementById('sheetBg').addEventListener('click',closeSheet);

  sh.addEventListener('touchstart',function(e){
    var sc=document.getElementById('sheetScroll');
    startY=e.touches[0].clientY;
    startScroll=sc.scrollTop;
    dragging=sc.scrollTop<=0;
  },{passive:true});
  sh.addEventListener('touchmove',function(e){
    if(!dragging) return;
    var dy=e.touches[0].clientY-startY;
    if(dy>0){
      sh.style.transform='translateY('+dy+'px)';
      sh.style.transition='none';
    }
  },{passive:true});
  sh.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-startY;
    sh.style.transform=''; sh.style.transition='';
    if(dy>80) closeSheet();
    dragging=false;
  },{passive:true});
})();

/* ── LIGHTBOX ─────────────────────── */
window._lb=function(src){
  document.getElementById('lbImg').src=src;
  document.getElementById('lightbox').classList.add('open');
};
document.getElementById('lbClose').addEventListener('click',function(){document.getElementById('lightbox').classList.remove('open');});
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

/* ── RESPONSIVE LAYOUT ───────────── */
function applyLayout(){
  var mob=isMobile();
  document.getElementById('sidebarDesk').style.display=mob?'none':'flex';
  document.getElementById('placeList').style.display=mob?'block':'none';
  document.getElementById('contentDesk').style.display='none';

  if(!mob){
    // Desktop: sheet is inline inside content — move it
    var content=document.querySelector('.content-desk');
    content.style.display='flex';
    content.style.flexDirection='column';
    content.style.overflow='hidden';
    // Append sheet to content-desk
    var sheet=document.getElementById('sheet');
    if(sheet.parentNode!==content){
      content.appendChild(sheet);
    }
    sheet.classList.add('open');
  }
}

/* ── INIT ─────────────────────────── */
buildDayBar();
buildSdTabs();
buildList(document.getElementById('placeList'),function(id){selectPlace(id);});
buildList(document.getElementById('sdList'),function(id){selectPlace(id);});
renderOverview();
applyLayout();
window.addEventListener('resize',applyLayout);

})();
</script>
